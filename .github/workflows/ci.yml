name: CI

# Backs the README's "tests pass on every commit / in CI on every PR" claim
# with reality. Two independent jobs:
#   - node:  build the workspace packages, typecheck every TS package, run the
#            keeper / candle-vision / pro-options test suites, and build the
#            frontend (Vite). Mirrors scripts/agent-preflight.sh.
#   - move:  install a pinned Sui CLI and run the full Move test suite, which
#            includes the seeded_path conformance vectors (Move <-> TS).
on:
  # Manual trigger — re-run CI on demand, e.g. to re-green the README badge after a
  # docs-only Move-test-count sync. Such a sync touches only *.md (paths-ignored
  # below), so it can't re-green the badge on its own when a prior code push went
  # red on the count drift: `gh workflow run ci.yml --ref main` after the sync.
  workflow_dispatch:
  # Skip CI for docs-only changes — markdown / docs touch no build, test, or
  # Move output, and the fleet ships a lot of them. This conserves the private
  # repo's metered Actions minutes (a day of doc PRs was burning ~6 min each
  # across the Node + Move jobs for zero signal).
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

# Cancel superseded runs on the same ref to save CI minutes — but NEVER on
# main. Rapid back-to-back merges were cancelling main's in-progress run on
# every new merge, so the default-branch CI almost never completed and the
# README's CI badge sat perpetually grey/cancelled. Let main runs always
# finish (badge reflects real status); PR/branch runs still cancel superseded.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  node:
    name: Node — build · typecheck · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install workspace deps
        run: npm ci

      # The frontend resolves @wick/sdk and the candle-vision / pro-options
      # packages through their dist/ output, so these must be built before any
      # dependent typecheck or the frontend build.
      - name: Build workspace packages
        run: |
          npm run build:packages
          npm run build:sdk

      # Those packages COMMIT their dist/ (the frontend + live game resolve them
      # via dist). The build above just regenerated it; fail if the committed
      # dist drifted from a fresh build — i.e. a PR edited src/ but forgot to
      # rebuild dist/, which would silently ship stale compiled code (a fairness
      # or pricing fix landing in source yet never reaching the running game).
      # Same git-diff guard as `npm run check:dist`, reusing the build above.
      - name: Committed dist/ in sync with a fresh build
        run: |
          git diff --exit-code -- packages/candle-vision/dist packages/candle-vision-react/dist packages/pro-options/dist sdk/dist \
            || { echo "::error::committed dist/ is stale — run 'npm run build:packages && npm -w @wick/sdk run build' and commit the dist/ changes"; exit 1; }

      - name: Typecheck (frontend · api · keeper · bots)
        run: |
          npm -w frontend run typecheck
          npm -w @wick/api run typecheck
          npm -w wick-keeper run typecheck
          npm -w wick-bots run typecheck

      # Run the full root `npm test` aggregate (sdk · bots · keeper · api ·
      # candle-vision · pro-options · verify-v4 · audit-rugs) rather than a
      # hardcoded subset — the subset had drifted and was silently NOT running
      # the verify-v4 fairness/rug guard, the audit-rugs guard, or the SDK
      # PTB-builder tests in CI. `npm test` excludes Move (that's the separate
      # job below), so this stays the Node-side unit gate and can't drift again.
      - name: Unit tests (sdk · bots · keeper · api · candle-vision · pro-options · verify-v4 · audit-rugs)
        run: npm test

      # The Move conformance test (move/tests/seeded_path_conformance.move) is
      # AUTO-GENERATED from the TS port (sdk/src/seededPath.ts): it embeds the
      # TS-computed rolling digests. `sui move test` only proves Move matches
      # those committed digests — it can't notice if seededPath.ts changed
      # without a regen. Regenerate here and fail on any diff, so the Move job
      # proving "Move == committed digests" composes into "Move == current TS"
      # — the byte-identical guarantee the README leans on.
      - name: Conformance vectors in sync with the TS port
        run: |
          npm run conformance
          git diff --exit-code move/tests/seeded_path_conformance.move \
            || { echo "::error::seeded_path_conformance.move is stale — run 'npm run conformance' after editing sdk/src/seededPath.ts and commit the result"; exit 1; }

      - name: Build frontend (Vite)
        run: npm run build:frontend

      # Static gate on the judge-facing HTML config (no browser): the cold-load
      # dark paint, the DeepBook-options share card, and the PNG touch icon — all
      # easy to silently revert when many hands edit index.html.
      - name: Meta / share-card / cold-load gate
        run: npm run check:meta

      # The Move test count is hard-coded in several judge-facing docs (README
      # badge + body, SAFETY.md, ADDRESSES.md, the runbook). It's drifted
      # 553→571→605→641 as tests were added, with some docs lagging each time.
      # Fail if any doc disagrees, so a judge never sees a count that mismatches.
      - name: Doc Move-test counts agree
        run: npm run check:doc-counts

  move:
    name: Move — sui move test
    runs-on: ubuntu-latest
    env:
      # Pin the Sui CLI to the testnet release the package is developed against
      # (local dev is sui 1.73.x). Bump in lockstep with the toolchain.
      SUI_VERSION: testnet-v1.73.1
    steps:
      - uses: actions/checkout@v4

      - name: Install Sui CLI
        run: |
          set -euo pipefail
          url="https://github.com/MystenLabs/sui/releases/download/${SUI_VERSION}/sui-${SUI_VERSION}-ubuntu-x86_64.tgz"
          echo "downloading $url"
          curl -fsSL "$url" -o /tmp/sui.tgz
          mkdir -p /tmp/sui-bin
          tar -xzf /tmp/sui.tgz -C /tmp/sui-bin
          # The tarball lays binaries either at the root or under a dir; find sui.
          sui_path="$(find /tmp/sui-bin -type f -name sui | head -1)"
          if [ -z "$sui_path" ]; then echo "sui binary not found in archive" >&2; exit 1; fi
          install -m 0755 "$sui_path" /usr/local/bin/sui
          sui --version

      - name: Move tests (incl. seeded_path conformance vectors)
        run: |
          cd move
          sui move test
