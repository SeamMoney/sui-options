<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- Warm DNS+TLS to the live data hosts during HTML parse so the first
         DeepBook mark/candle fetch (the /pro chart) and Sui RPC calls don't
         pay connection setup on the critical path — the chart/data show sooner. -->
    <link rel="preconnect" href="https://deepbook-indexer.mainnet.mystenlabs.com" crossorigin />
    <link rel="preconnect" href="https://sui-testnet-rpc.publicnode.com" crossorigin />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#863bff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Wick" />

    <title>Wick Markets — options for the next candle</title>
    <meta
      name="description"
      content="Touch / no-touch options on Sui. Tap and hold the chart to ride a barrier tick-by-tick — provably fair from on-chain randomness."
    />

    <!-- Open Graph / social share card -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Wick Markets" />
    <meta property="og:title" content="Wick Markets — options for the next candle" />
    <meta
      property="og:description"
      content="Touch / no-touch options on Sui. Tap and hold the chart to ride a barrier tick-by-tick — provably fair from on-chain randomness."
    />
    <meta property="og:url" content="https://wick-markets.vercel.app/ride" />
    <meta property="og:image" content="https://wick-markets.vercel.app/og.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Wick Markets — a candle wicking into a barrier line for a 1.75x touch payout" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Wick Markets — options for the next candle" />
    <meta
      name="twitter:description"
      content="Touch / no-touch options on Sui. Tap and hold the chart to ride a barrier tick-by-tick — provably fair from on-chain randomness."
    />
    <meta name="twitter:image" content="https://wick-markets.vercel.app/og.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,400;1,600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
